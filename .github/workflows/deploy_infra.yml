name: Deploy Infra (S3 + Redshift + VPC)

on:
  push:
    branches: [main]
    paths:
      - 'terraform/infra/**'
      - 'terraform/_globals/**'
  pull_request:
    paths:
      - 'terraform/infra/**'

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    name: Terraform Infra
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/banking-pipeline-github-infra-${{ vars.ENV }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        working-directory: terraform/infra
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ vars.AWS_REGION }}"

      - name: Terraform Plan
        working-directory: terraform/infra
        run: |
          terraform plan \
            -var="env=${{ vars.ENV }}" \
            -var="aws_account_id=${{ vars.AWS_ACCOUNT_ID }}" \
            -var="aws_region=${{ vars.AWS_REGION }}" \
            -var="tf_state_bucket=${{ vars.TF_STATE_BUCKET }}" \
            -var="redshift_admin_password=${{ secrets.REDSHIFT_ADMIN_PASSWORD }}" \
            -out=tfplan

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: terraform/infra
        run: terraform apply -auto-approve tfplan
