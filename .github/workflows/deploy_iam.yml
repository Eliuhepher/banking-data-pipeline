name: Deploy IAM (OIDC Bootstrap)

on:
  push:
    branches: [main]
    paths:
      - 'terraform/iam/**'
      - 'terraform/_globals/**'
  pull_request:
    paths:
      - 'terraform/iam/**'
  workflow_dispatch:
    inputs:
      action:
        description: 'plan o apply'
        type: choice
        options: [plan, apply]
        default: plan

# Permiso requerido para solicitar el JWT de OIDC a GitHub
permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    name: Terraform IAM
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # OIDC: GitHub solicita un JWT firmado y AWS lo valida contra el OIDC provider.
      # No hay claves de larga duración en ningún lugar.
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/banking-pipeline-github-iam-bootstrap
          aws-region: ${{ vars.AWS_REGION }}
          # El bootstrap role (creado manualmente una sola vez) tiene permisos para crear
          # los roles definidos en terraform/iam/. Una vez aplicado, los workflows
          # siguientes usan los roles que este mismo crea.

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Terraform Init
        working-directory: terraform/iam
        run: |
          terraform init \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ vars.AWS_REGION }}"

      - name: Terraform Plan
        working-directory: terraform/iam
        run: |
          terraform plan \
            -var="env=${{ vars.ENV }}" \
            -var="aws_account_id=${{ vars.AWS_ACCOUNT_ID }}" \
            -var="aws_region=${{ vars.AWS_REGION }}" \
            -var="github_org=${{ vars.ORG }}" \
            -var="github_repo=${{ vars.REPO }}" \
            -out=tfplan

      - name: Terraform Apply
        if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && inputs.action == 'apply')
        working-directory: terraform/iam
        run: terraform apply -auto-approve tfplan
